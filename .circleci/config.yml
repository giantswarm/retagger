version: 2

orbs:
  architect: giantswarm/architect@4.9.0

jobs:
  validate-yaml:
    executor: "architect"
    steps:
      - checkout

      - setup_remote_docker:
          version: 20.10.11

      - run:
          name: Validate YAML
          command: |
            docker run --rm -ti \
            -v $PWD:/workdir \
            giantswarm/yamllint \
            -d '{extends: default, rules: {line-length: {max: 200}, document-start: disable, indentation: {spaces: 0}}}' \
            images.yaml

  retagQuay:
    environment:
      REGISTRY: "quay.io"
      REGISTRY_ORGANISATION: "giantswarm"
    executor: "architect"
    steps:
      - checkout

      - run:
          name: Get latest retagger binary
          command: |
            curl -s -H "Authorization: token $RELEASE_TOKEN" https://api.github.com/repos/giantswarm/retagger/releases/latest | \
              jq -rc '.assets[] | select(.name | contains("linux-amd64")) | .browser_download_url' | \
              xargs curl -sSL | tar xzv --strip-components=1

            ./retagger version

      - run:
          name: Set registry credentials
          command: |
            echo 'export REGISTRY_USERNAME=${QUAY_USERNAME}' >> $BASH_ENV
            echo 'export REGISTRY_PASSWORD=${QUAY_PASSWORD}' >> $BASH_ENV
            source $BASH_ENV

      - run:
          name: Execute retagger
          command: ./retagger -r ${REGISTRY} -o ${REGISTRY_ORGANISATION} -u ${REGISTRY_USERNAME} -p ${REGISTRY_PASSWORD}

  retagAliyun:
    environment:
      REGISTRY: "registry-intl.cn-shanghai.aliyuncs.com"
      REGISTRY_ORGANISATION: "giantswarm"
    executor: "architect"
    steps:
      - checkout

      - run:
          name: Get latest retagger binary
          command: |
            curl -s -H "Authorization: token $RELEASE_TOKEN" https://api.github.com/repos/giantswarm/retagger/releases/latest | \
              jq -rc '.assets[] | select(.name | contains("linux-amd64")) | .browser_download_url' | \
              xargs curl -sSL | tar xzv --strip-components=1

            ./retagger version

      - run:
          name: Execute retagger
          command: ./retagger -r ${REGISTRY} -o ${REGISTRY_ORGANISATION} -u ${REGISTRY_USERNAME} -p ${REGISTRY_PASSWORD} --access-key ${ALIYUN_ACCESS_KEY} --access-secret ${ALIYUN_ACCESS_SECRET} --aliyun-region ${ALIYUN_REGION}

build_and_retag:  &build_and_retag
  jobs:
    - retagQuay:
        filters:
          branches:
            only: master
        requires:
          - build
    #- retagAliyun:
    #    filters:
    #      branches:
    #        only: master
    #    requires:
    #      - build

workflows:
  version: 2
  #build_retag:
  #  <<: *build_and_retag

  go-build:
    jobs:
      - architect/go-build:
          name: go-build-retagger
          binary: retagger
          # Needed to trigger job also on git tag.
          filters:
            tags:
              only: /^v.*/

